<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Five-Box</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Five-Box</h1>
    <button id="stats-btn" aria-label="Statistics">📊</button>
  </header>

  <div id="toast-container"></div>

  <main>
    <div id="game-board">
      <!-- 6 rows x 5 tiles = 30 tiles, generated by JS -->
    </div>

    <div id="keyboard">
      <div class="keyboard-row">
        <button data-key="Q">Q</button>
        <button data-key="W">W</button>
        <button data-key="E">E</button>
        <button data-key="R">R</button>
        <button data-key="T">T</button>
        <button data-key="Y">Y</button>
        <button data-key="U">U</button>
        <button data-key="I">I</button>
        <button data-key="O">O</button>
        <button data-key="P">P</button>
      </div>
      <div class="keyboard-row">
        <button data-key="A">A</button>
        <button data-key="S">S</button>
        <button data-key="D">D</button>
        <button data-key="F">F</button>
        <button data-key="G">G</button>
        <button data-key="H">H</button>
        <button data-key="J">J</button>
        <button data-key="K">K</button>
        <button data-key="L">L</button>
      </div>
      <div class="keyboard-row">
        <button data-key="ENTER" class="wide">ENTER</button>
        <button data-key="Z">Z</button>
        <button data-key="X">X</button>
        <button data-key="C">C</button>
        <button data-key="V">V</button>
        <button data-key="B">B</button>
        <button data-key="N">N</button>
        <button data-key="M">M</button>
        <button data-key="BACKSPACE" class="wide">⌫</button>
      </div>
    </div>
  </main>

  <!-- Stats Modal -->
  <div id="stats-modal" class="modal hidden">
    <div class="modal-content">
      <button id="close-stats" class="close-btn">&times;</button>
      <h2>Statistics</h2>
      <div id="stats-grid">
        <div class="stat">
          <span id="games-played">0</span>
          <label>Played</label>
        </div>
        <div class="stat">
          <span id="win-percent">0</span>
          <label>Win %</label>
        </div>
        <div class="stat">
          <span id="current-streak">0</span>
          <label>Current Streak</label>
        </div>
        <div class="stat">
          <span id="max-streak">0</span>
          <label>Max Streak</label>
        </div>
      </div>
      <h3>Guess Distribution</h3>
      <div id="guess-distribution">
        <!-- Generated by JS -->
      </div>
      <button id="share-btn" class="hidden">Share 📋</button>
    </div>
  </div>

  <!-- Game Over Modal -->
  <div id="game-over-modal" class="modal hidden">
    <div class="modal-content">
      <button id="close-game-over" class="close-btn">&times;</button>
      <h2 id="game-over-title">You Win!</h2>
      <p id="game-over-message"></p>
      <button id="share-result-btn">Share Result 📋</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
